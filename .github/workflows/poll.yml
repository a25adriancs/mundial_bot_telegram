name: World Cup Poll Notifications

on:
  schedule:
    # Cada 5 minutos durante el torneo (11 jun - 19 jul 2026)
    - cron: '*/10 * * * *'
  workflow_dispatch:  # Permite ejecuciÃ³n manual

jobs:
  poll:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run poll
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WORLDCUP_API_EMAIL: ${{ secrets.WORLDCUP_API_EMAIL }}
          WORLDCUP_API_PASSWORD: ${{ secrets.WORLDCUP_API_PASSWORD }}
          NODE_ENV: production
        run: node jobs/poll.js
