name: Mundial Polling
on:
  schedule:
    - cron: "0 * * * *"   # modo dormido: cada hora
  workflow_dispatch: {}    # para poder forzarlo manualmente si hace falta

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Comprobar estado de partidos
        id: check
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: node scripts/check-match-window.js >> "$GITHUB_OUTPUT"

      - name: Activar polling cada 5 min
        if: steps.check.outputs.mode == 'active'
        uses: gr2m/set-cron-schedule-action@v2
        with:
          token: ${{ secrets.PAT_WITH_WORKFLOW_SCOPE }}
          cron: "*/5 * * * *"
          workflow: mundial-polling.yml
          message: "ci: activar polling cada 5min (partido en curso)"

      - name: Ejecutar polling real
        if: steps.check.outputs.mode == 'active'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: node scripts/poll-and-update-cache.js

      - name: Volver a modo dormido
        if: steps.check.outputs.mode == 'idle'
        uses: gr2m/set-cron-schedule-action@v2
        with:
          token: ${{ secrets.PAT_WITH_WORKFLOW_SCOPE }}
          cron: "0 * * * *"
          workflow: mundial-polling.yml
          message: "ci: volver a polling horario (sin partidos en curso)"
