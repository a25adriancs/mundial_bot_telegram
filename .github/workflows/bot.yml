name: Bot Mundial 2026 - Notificaciones

on:
  schedule:
    # Cada 15 minutos
    - cron: '*/15 * * * *'
  workflow_dispatch:  # Permite ejecutar manualmente

jobs:
  check-results:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Run notification check
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          JWT_TOKEN: ${{ secrets.JWT_TOKEN }}
        run: |
          python notify.py
      
      - name: Save notified matches
        uses: actions/upload-artifact@v4
        with:
          name: notified-matches
          path: notified_matches.json
          if-no-files-found: ignore
      
      - name: Save subscribers
        uses: actions/upload-artifact@v4
        with:
          name: subscribers
          path: subscribers.json
          if-no-files-found: ignore